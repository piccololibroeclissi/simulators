<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Redirect immediato (fallback senza JavaScript) -->
  <meta http-equiv="refresh" content="0; url=https://acacciadieclissi.space/simulators">
  <!-- Aiuta i motori di ricerca a considerare la nuova URL come quella ufficiale -->
  <link rel="canonical" href="https://acacciadieclissi.space/simulators">
  <title>Reindirizzamento in corso…</title>
  <script>
    // Redirect immediato via JavaScript.
    // replace() non aggiunge questa pagina alla cronologia,
    // così il tasto "indietro" del browser funziona correttamente.
    window.location.replace("https://acacciadieclissi.space/simulators");
  </script>
</head>
<body>
  <p>
    Reindirizzamento verso l'eclisse giusta in corso…<br>
    Se non vieni reindirizzato automaticamente,
    <a href="https://acacciadieclissi.space/simulators">clicca qui</a>.
  </p>
</body>
</html>
